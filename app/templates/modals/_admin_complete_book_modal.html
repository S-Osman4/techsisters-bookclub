{# app/templates/modals/_admin_complete_book_modal.html #}
<div
  id="admin-complete-book-modal"
  class="modal-overlay hidden"
  role="dialog"
  aria-modal="true"
  aria-labelledby="complete-modal-title"
>
  <div class="modal-container" onclick="event.stopPropagation()">
    <div
      class="flex items-center justify-between px-6 pt-6 pb-4 border-b border-gray-100"
    >
      <h2
        id="complete-modal-title"
        class="font-heading text-xl font-bold text-gray-900"
      >
        Mark book as completed
      </h2>
      <button
        onclick="closeModal('admin-complete-book-modal')"
        class="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors"
        aria-label="Close"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <div class="px-6 py-5">
      <p class="text-sm text-gray-600 mb-2">
        This will move
        <strong class="text-gray-900">
          &ldquo;{{ current_book.title if current_book else "the current book"
          }}&rdquo;
        </strong>
        to past books.
      </p>
      <p class="text-sm text-gray-500 mb-5">
        All in-progress reading records will be automatically marked as
        completed.
      </p>

      <div id="complete-result" role="status" aria-live="polite"></div>

      <div class="flex gap-3 mt-4">
        <button
          id="complete-book-btn"
          onclick="completeCurrentBook()"
          class="btn btn-secondary flex-1"
        >
          <span class="btn-text">Yes, mark completed</span>
          <span class="loading-spinner" aria-hidden="true"></span>
        </button>
        <button
          onclick="closeModal('admin-complete-book-modal')"
          class="btn btn-ghost flex-1"
        >
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
