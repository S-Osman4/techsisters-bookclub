{# app/templates/modals/_admin_edit_book_modal.html #}
<div
  id="admin-edit-book-modal"
  class="modal-overlay hidden"
  role="dialog"
  aria-modal="true"
  aria-labelledby="edit-book-modal-title"
>
  <div
    class="modal-container modal-container-lg"
    onclick="event.stopPropagation()"
  >
    <div
      class="flex items-center justify-between px-6 pt-6 pb-4 border-b border-gray-100"
    >
      <h2
        id="edit-book-modal-title"
        class="font-heading text-xl font-bold text-gray-900"
      >
        Edit current book
      </h2>
      <button
        onclick="closeModal('admin-edit-book-modal')"
        class="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors"
        aria-label="Close"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <div class="px-6 py-5 space-y-4">
      <div>
        <label
          for="edit-title"
          class="block text-sm font-medium text-gray-700 mb-1.5"
        >
          Title
        </label>
        <input
          type="text"
          id="edit-title"
          class="input"
          value="{{ current_book.title if current_book else '' }}"
          maxlength="200"
        />
      </div>

      <div>
        <label
          for="edit-pdf"
          class="block text-sm font-medium text-gray-700 mb-1.5"
        >
          PDF URL
        </label>
        <input
          type="url"
          id="edit-pdf"
          class="input"
          value="{{ current_book.pdf_url if current_book else '' }}"
          placeholder="https://example.com/book.pdf"
        />
      </div>

      <div>
        <label
          for="edit-cover"
          class="block text-sm font-medium text-gray-700 mb-1.5"
        >
          Cover image URL
          <span class="text-xs text-gray-400 ml-1">(optional)</span>
        </label>
        <input
          type="url"
          id="edit-cover"
          class="input"
          value="{{ current_book.cover_image_url
                    if current_book and current_book.cover_image_url
                    else '' }}"
          placeholder="https://example.com/cover.jpg"
        />
      </div>

      {# ── Chapter assignment — two fields, chapter_to auto-fills from
      chapter_from #}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Reading assignment
        </label>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label
              for="edit-chapter-from"
              class="block text-xs text-gray-500 mb-1"
              >From chapter</label
            >
            <input
              type="number"
              id="edit-chapter-from"
              class="input"
              value="{{ current_book.chapter_from if current_book and current_book.chapter_from else '' }}"
              placeholder="e.g. 1"
              min="1"
            />
          </div>
          <div>
            <label
              for="edit-chapter-to"
              class="block text-xs text-gray-500 mb-1"
              >To chapter</label
            >
            <input
              type="number"
              id="edit-chapter-to"
              class="input"
              value="{{ current_book.chapter_to if current_book and current_book.chapter_to else '' }}"
              placeholder="auto"
              min="1"
            />
          </div>
        </div>
        <p
          id="eb-chapter-preview"
          class="text-xs font-medium mt-1.5 min-h-[1rem] text-secondary"
        ></p>
        <p class="text-xs text-gray-400 mt-0.5">
          &ldquo;To&rdquo; auto-fills to match &ldquo;From&rdquo; for a single
          chapter. Change it for a range.
        </p>
      </div>

      <div>
        <label
          for="edit-total"
          class="block text-sm font-medium text-gray-700 mb-1.5"
        >
          Total chapters
          <span class="text-xs text-gray-400 ml-1">(optional)</span>
        </label>
        <input
          type="number"
          id="edit-total"
          class="input"
          value="{{ current_book.total_chapters
                    if current_book and current_book.total_chapters
                    else '' }}"
          min="1"
          placeholder="e.g. 12"
        />
        <p class="text-xs text-gray-400 mt-1.5">
          Used for the member progress selector and community stats.
        </p>
      </div>

      <div id="edit-book-result" role="status" aria-live="polite"></div>

      <div class="flex gap-3 pt-1">
        <button
          id="edit-book-btn"
          onclick="updateCurrentBook()"
          class="btn btn-primary flex-1"
        >
          <span class="btn-text">Save changes</span>
          <span class="loading-spinner" aria-hidden="true"></span>
        </button>
        <button
          onclick="closeModal('admin-edit-book-modal')"
          class="btn btn-ghost flex-1"
        >
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
