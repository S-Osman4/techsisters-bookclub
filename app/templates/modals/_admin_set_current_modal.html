{# app/templates/modals/_admin_set_current_modal.html #}
<div
  id="admin-set-current-modal"
  class="modal-overlay hidden"
  role="dialog"
  aria-modal="true"
  aria-labelledby="set-current-modal-title"
>
  <div class="modal-container" onclick="event.stopPropagation()">
    <div
      class="flex items-center justify-between px-6 pt-6 pb-4 border-b border-gray-100"
    >
      <h2
        id="set-current-modal-title"
        class="font-heading text-xl font-bold text-gray-900"
      >
        Set as current book
      </h2>
      <button
        onclick="closeModal('admin-set-current-modal')"
        class="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors"
        aria-label="Close"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <div class="px-6 py-5 space-y-4">
      <p
        id="set-current-book-title"
        class="text-sm font-medium text-gray-700"
      ></p>

      {# ── Chapter assignment — two fields, chapter_to auto-fills from
      chapter_from #}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Reading assignment
          <span class="text-red-400 ml-0.5" aria-hidden="true">*</span>
        </label>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label
              for="set-current-chapter-from"
              class="block text-xs text-gray-500 mb-1"
              >From chapter</label
            >
            <input
              type="number"
              id="set-current-chapter-from"
              class="input"
              placeholder="e.g. 1"
              min="1"
              required
            />
          </div>
          <div>
            <label
              for="set-current-chapter-to"
              class="block text-xs text-gray-500 mb-1"
              >To chapter</label
            >
            <input
              type="number"
              id="set-current-chapter-to"
              class="input"
              placeholder="auto"
              min="1"
            />
          </div>
        </div>
        <p
          id="sc-chapter-preview"
          class="text-xs font-medium mt-1.5 min-h-[1rem] text-secondary"
        ></p>
        <p class="text-xs text-gray-400 mt-0.5">
          &ldquo;To&rdquo; auto-fills to match &ldquo;From&rdquo; for a single
          chapter. Change it for a range.
        </p>
      </div>

      <div>
        <label
          for="set-current-cover"
          class="block text-sm font-medium text-gray-700 mb-1.5"
        >
          Cover image URL
          <span class="text-xs text-gray-400 ml-1">
            (optional — updates existing cover)
          </span>
        </label>
        <input
          type="url"
          id="set-current-cover"
          class="input"
          placeholder="https://example.com/cover.jpg"
        />
      </div>

      <div>
        <label
          for="set-current-total"
          class="block text-sm font-medium text-gray-700 mb-1.5"
        >
          Total chapters
          <span class="text-xs text-gray-400 ml-1">
            (optional — for progress tracking)
          </span>
        </label>
        <input
          type="number"
          id="set-current-total"
          class="input"
          placeholder="e.g. 12"
          min="1"
        />
      </div>

      <div id="set-current-result" role="status" aria-live="polite"></div>

      <div class="flex gap-3 pt-1">
        <button
          id="set-current-btn"
          onclick="
            if (typeof setCurrentBook === 'function') setCurrentBook();
            else console.error('setCurrentBook not defined');
          "
          class="btn btn-primary flex-1"
        >
          <span class="btn-text">Set as current</span>
          <span class="loading-spinner" aria-hidden="true"></span>
        </button>
        <button
          onclick="closeModal('admin-set-current-modal')"
          class="btn btn-ghost flex-1"
        >
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
