{# app/templates/modals/_admin_code_modal.html #}
<div
  id="admin-code-modal"
  class="modal-overlay hidden"
  role="dialog"
  aria-modal="true"
  aria-labelledby="code-modal-title"
>
  <div class="modal-container" onclick="event.stopPropagation()">
    <div
      class="flex items-center justify-between px-6 pt-6 pb-4 border-b border-gray-100"
    >
      <h2
        id="code-modal-title"
        class="font-heading text-xl font-bold text-gray-900"
      >
        Change access code
      </h2>
      <button
        onclick="closeModal('admin-code-modal')"
        class="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors"
        aria-label="Close"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <div class="px-6 py-5 space-y-4">
      <div>
        <label
          for="new-code-input"
          class="block text-sm font-medium text-gray-700 mb-1.5"
        >
          New access code
        </label>
        <div class="flex gap-2">
          <input
            type="text"
            id="new-code-input"
            class="input flex-1 font-mono uppercase tracking-widest"
            placeholder="e.g. BOOKS2026"
            maxlength="20"
            autocomplete="off"
          />
          <button
            id="generate-btn"
            onclick="generateCode()"
            class="btn btn-ghost text-sm flex-shrink-0 px-4"
          >
            Generate
          </button>
        </div>
        <p class="text-xs text-gray-400 mt-1.5">
          Letters and numbers only. Minimum 4 characters.
        </p>
      </div>

      <div id="code-modal-result" role="status" aria-live="polite"></div>

      <div class="flex gap-3 pt-1">
        <button
          id="update-code-btn"
          onclick="updateAccessCode()"
          class="btn btn-primary flex-1"
        >
          <span class="btn-text">Update code</span>
          <span class="loading-spinner" aria-hidden="true"></span>
        </button>
        <button
          onclick="closeModal('admin-code-modal')"
          class="btn btn-ghost flex-1"
        >
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
